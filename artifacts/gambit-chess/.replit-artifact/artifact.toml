kind = "web"
previewPath = "/"
title = "Gambit — Chess"
version = "1.0.0"
id = "artifacts/gambit-chess"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25869

[services.development]
run = "pnpm --filter @workspace/gambit-chess run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gambit-chess", "run", "build" ]
publicDir = "artifacts/gambit-chess/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25869"
BASE_PATH = "/"
